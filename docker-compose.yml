services:
  # Note: pgvector (semantic search / RAG) is postgres-only — those endpoints won't work on mysql.
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: health
      MYSQL_USER: health
      MYSQL_PASSWORD: health
      MYSQL_ROOT_PASSWORD: health
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "health", "-phealth"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata data_fixture.json &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_ENGINE: mysql
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"

  worker:
    build: .
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_ENGINE: mysql
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    command: celery -A config beat -l info
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_ENGINE: mysql
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysqldata:
